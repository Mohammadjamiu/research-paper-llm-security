<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">OWASP Top 10 category distribution by model</title>
  <desc id="desc">Stacked bar chart showing normalized findings mapped to OWASP categories for Gemini 3.5 Flash, DeepSeek V4 Flash, Kimi K2.5, and GPT-5.4-mini.</desc>

  <rect width="980" height="620" fill="#ffffff"/>

  <text x="490" y="46" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#111827">
    OWASP-Mapped Finding Distribution by Model
  </text>
  <text x="490" y="76" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5563">
    Normalized SAST/manual-review findings mapped to OWASP Top 10 categories
  </text>

  <!-- Chart area: left=100, top=115, width=620, height=300. Scale: max 25 findings, 12 px per finding. -->
  <line x1="100" y1="415" x2="720" y2="415" stroke="#111827" stroke-width="1.5"/>
  <line x1="100" y1="115" x2="100" y2="415" stroke="#111827" stroke-width="1.5"/>

  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280">
    <line x1="100" y1="415" x2="720" y2="415" stroke="#e5e7eb" stroke-width="1"/>
    <text x="86" y="419" text-anchor="end">0</text>
    <line x1="100" y1="355" x2="720" y2="355" stroke="#e5e7eb" stroke-width="1"/>
    <text x="86" y="359" text-anchor="end">5</text>
    <line x1="100" y1="295" x2="720" y2="295" stroke="#e5e7eb" stroke-width="1"/>
    <text x="86" y="299" text-anchor="end">10</text>
    <line x1="100" y1="235" x2="720" y2="235" stroke="#e5e7eb" stroke-width="1"/>
    <text x="86" y="239" text-anchor="end">15</text>
    <line x1="100" y1="175" x2="720" y2="175" stroke="#e5e7eb" stroke-width="1"/>
    <text x="86" y="179" text-anchor="end">20</text>
    <line x1="100" y1="115" x2="720" y2="115" stroke="#e5e7eb" stroke-width="1"/>
    <text x="86" y="119" text-anchor="end">25</text>
  </g>

  <!-- Colors -->
  <!-- A01 #1d4ed8, A02 #9333ea, A03 #dc2626, A04 #f97316, A05 #facc15, A07 #16a34a, A08 #0891b2 -->

  <g font-family="Arial, Helvetica, sans-serif">
    <!-- Gemini total 21: A01=1, A02=1, A04=10, A05=6, A07=1, A08=2 -->
    <rect x="150" y="403" width="92" height="12" fill="#1d4ed8"/>
    <rect x="150" y="391" width="92" height="12" fill="#9333ea"/>
    <rect x="150" y="271" width="92" height="120" fill="#f97316"/>
    <rect x="150" y="199" width="92" height="72" fill="#facc15"/>
    <rect x="150" y="187" width="92" height="12" fill="#16a34a"/>
    <rect x="150" y="163" width="92" height="24" fill="#0891b2"/>
    <text x="196" y="152" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">21</text>
    <text x="196" y="443" text-anchor="middle" font-size="13" fill="#111827">Gemini 3.5</text>
    <text x="196" y="461" text-anchor="middle" font-size="13" fill="#111827">Flash</text>

    <!-- DeepSeek total 15: A03=1, A04=7, A05=6, A07=1 -->
    <rect x="285" y="403" width="92" height="12" fill="#dc2626"/>
    <rect x="285" y="319" width="92" height="84" fill="#f97316"/>
    <rect x="285" y="247" width="92" height="72" fill="#facc15"/>
    <rect x="285" y="235" width="92" height="12" fill="#16a34a"/>
    <text x="331" y="224" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">15</text>
    <text x="331" y="443" text-anchor="middle" font-size="13" fill="#111827">DeepSeek V4</text>
    <text x="331" y="461" text-anchor="middle" font-size="13" fill="#111827">Flash</text>

    <!-- Kimi total 18: A04=5, A05=9, A07=1, A08=3 -->
    <rect x="420" y="355" width="92" height="60" fill="#f97316"/>
    <rect x="420" y="247" width="92" height="108" fill="#facc15"/>
    <rect x="420" y="235" width="92" height="12" fill="#16a34a"/>
    <rect x="420" y="199" width="92" height="36" fill="#0891b2"/>
    <text x="466" y="188" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">18</text>
    <text x="466" y="443" text-anchor="middle" font-size="13" fill="#111827">Kimi K2.5</text>

    <!-- GPT total 10: A01=4, A04=4, A05=2 -->
    <rect x="555" y="367" width="92" height="48" fill="#1d4ed8"/>
    <rect x="555" y="319" width="92" height="48" fill="#f97316"/>
    <rect x="555" y="295" width="92" height="24" fill="#facc15"/>
    <text x="601" y="284" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">10</text>
    <text x="601" y="443" text-anchor="middle" font-size="13" fill="#111827">GPT-5.4</text>
    <text x="601" y="461" text-anchor="middle" font-size="13" fill="#111827">mini</text>
  </g>

  <!-- Legend -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#111827">
    <text x="765" y="132" font-size="15" font-weight="700">OWASP Category</text>
    <rect x="765" y="152" width="14" height="14" fill="#1d4ed8"/><text x="787" y="164">A01 Access Control</text>
    <rect x="765" y="179" width="14" height="14" fill="#9333ea"/><text x="787" y="191">A02 Cryptographic</text>
    <rect x="765" y="206" width="14" height="14" fill="#dc2626"/><text x="787" y="218">A03 Injection</text>
    <rect x="765" y="233" width="14" height="14" fill="#f97316"/><text x="787" y="245">A04 Insecure Design</text>
    <rect x="765" y="260" width="14" height="14" fill="#facc15"/><text x="787" y="272">A05 Misconfiguration</text>
    <rect x="765" y="287" width="14" height="14" fill="#16a34a"/><text x="787" y="299">A07 Auth Failures</text>
    <rect x="765" y="314" width="14" height="14" fill="#0891b2"/><text x="787" y="326">A08 Integrity</text>
  </g>

  <!-- Axis labels -->
  <text x="410" y="512" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827">
    Evaluated Coding System
  </text>
  <text x="28" y="265" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827" transform="rotate(-90 28 265)">
    Number of Findings
  </text>

  <text x="490" y="570" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280">
    Figure 2. OWASP-mapped finding distribution. Categories with zero findings are omitted from the legend for readability.
  </text>
</svg>
