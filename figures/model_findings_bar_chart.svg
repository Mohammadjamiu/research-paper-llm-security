<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" role="img" aria-labelledby="title desc">
  <title id="title">Total normalized security findings by model</title>
  <desc id="desc">Bar chart comparing normalized security findings across Gemini 3.5 Flash, Kimi K2.5, DeepSeek V4 Flash, and GPT-5.4-mini. Gemini has 21 findings, Kimi has 18, DeepSeek has 15, and GPT-5.4-mini has 10.</desc>

  <rect width="900" height="540" fill="#ffffff"/>

  <text x="450" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#111827">
    Total Normalized Security Findings by Model
  </text>
  <text x="450" y="78" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5563">
    SAST/manual-review findings after duplicate consolidation, n = 40 generated samples
  </text>

  <!-- Chart area: left=100, top=110, width=700, height=300. Scale: max 25 findings. -->
  <line x1="100" y1="410" x2="800" y2="410" stroke="#111827" stroke-width="1.5"/>
  <line x1="100" y1="110" x2="100" y2="410" stroke="#111827" stroke-width="1.5"/>

  <!-- Horizontal gridlines and labels -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280">
    <line x1="100" y1="410" x2="800" y2="410" stroke="#e5e7eb" stroke-width="1"/>
    <text x="86" y="414" text-anchor="end">0</text>

    <line x1="100" y1="350" x2="800" y2="350" stroke="#e5e7eb" stroke-width="1"/>
    <text x="86" y="354" text-anchor="end">5</text>

    <line x1="100" y1="290" x2="800" y2="290" stroke="#e5e7eb" stroke-width="1"/>
    <text x="86" y="294" text-anchor="end">10</text>

    <line x1="100" y1="230" x2="800" y2="230" stroke="#e5e7eb" stroke-width="1"/>
    <text x="86" y="234" text-anchor="end">15</text>

    <line x1="100" y1="170" x2="800" y2="170" stroke="#e5e7eb" stroke-width="1"/>
    <text x="86" y="174" text-anchor="end">20</text>

    <line x1="100" y1="110" x2="800" y2="110" stroke="#e5e7eb" stroke-width="1"/>
    <text x="86" y="114" text-anchor="end">25</text>
  </g>

  <!-- Bars. Scale: 12 px per finding. Baseline y=410. -->
  <g font-family="Arial, Helvetica, sans-serif">
    <!-- Gemini: 21 findings, height 252, y 158 -->
    <rect x="155" y="158" width="100" height="252" fill="#dc2626" rx="4"/>
    <text x="205" y="147" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">21</text>
    <text x="205" y="438" text-anchor="middle" font-size="13" fill="#111827">Gemini 3.5</text>
    <text x="205" y="456" text-anchor="middle" font-size="13" fill="#111827">Flash</text>

    <!-- Kimi: 18 findings, height 216, y 194 -->
    <rect x="315" y="194" width="100" height="216" fill="#f97316" rx="4"/>
    <text x="365" y="183" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">18</text>
    <text x="365" y="438" text-anchor="middle" font-size="13" fill="#111827">Kimi K2.5</text>

    <!-- DeepSeek: 15 findings, height 180, y 230 -->
    <rect x="475" y="230" width="100" height="180" fill="#2563eb" rx="4"/>
    <text x="525" y="219" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">15</text>
    <text x="525" y="438" text-anchor="middle" font-size="13" fill="#111827">DeepSeek V4</text>
    <text x="525" y="456" text-anchor="middle" font-size="13" fill="#111827">Flash</text>

    <!-- GPT: 10 findings, height 120, y 290 -->
    <rect x="635" y="290" width="100" height="120" fill="#16a34a" rx="4"/>
    <text x="685" y="279" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">10</text>
    <text x="685" y="438" text-anchor="middle" font-size="13" fill="#111827">GPT-5.4</text>
    <text x="685" y="456" text-anchor="middle" font-size="13" fill="#111827">mini</text>
  </g>

  <!-- Axis labels -->
  <text x="450" y="506" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827">
    Evaluated Coding System
  </text>
  <text x="28" y="260" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827" transform="rotate(-90 28 260)">
    Number of Findings
  </text>

  <text x="450" y="526" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280">
    Figure 1. Total normalized findings per model. Counts should be interpreted as SAST/manual-review security signals, not definitive vulnerability ground truth.
  </text>
</svg>
