<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Market | Search Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --accent: #f43f5e;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-light: #94a3b8;
            --border: #334155;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.5;
        }

        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .search-container {
            position: relative;
            flex-grow: 1;
            max-width: 600px;
            margin: 0 2rem;
        }

        #search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            padding-left: 3rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background-color: var(--card-bg);
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
            box-shadow: var(--shadow);
        }

        #search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        .main-content {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
        }

        aside {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            height: fit-content;
            position: sticky;
            top: 2rem;
            box-shadow: var(--shadow);
            animation: fadeInLeft 0.8s ease-out;
        }

        .filter-group {
            margin-bottom: 2rem;
        }

        .filter-group h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--text);
        }

        select, input[type="number"] {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--bg);
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .price-inputs {
            display: flex;
            gap: 0.5rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            animation: fadeIn 1s ease-out;
        }

        .product-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
        }

        .product-info {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-category {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        .product-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .product-description {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 1.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text);
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            background: #fef3c7;
            color: #d97706;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem;
            color: var(--text-light);
        }

        .loading-shimmer {
            background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            aside {
                position: static;
                margin-bottom: 2rem;
            }
        }
    </style>
</head>
<body data-theme="light">
    <div class="container">
        <header>
            <div class="logo">NexusMarket</div>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="Search for everything tech...">
            </div>
            <button id="theme-toggle" style="background: none; border: none; cursor: pointer; font-size: 1.5rem;">🌙</button>
        </header>

        <main class="main-content">
            <aside>
                <div class="filter-group">
                    <h3>Categories</h3>
                    <select id="category-filter">
                        <option value="">All Categories</option>
                    </select>
                </div>

                <div class="filter-group">
                    <h3>Price Range</h3>
                    <div class="price-inputs">
                        <input type="number" id="min-price" placeholder="Min">
                        <input type="number" id="max-price" placeholder="Max">
                    </div>
                </div>

                <div class="filter-group">
                    <h3>Sort By</h3>
                    <select id="sort-by">
                        <option value="id">Default</option>
                        <option value="name">Name</option>
                        <option value="price">Price: Low to High</option>
                        <option value="price_desc">Price: High to Low</option>
                        <option value="rating">Rating</option>
                    </select>
                </div>

                <button id="reset-filters" style="width: 100%; padding: 0.8rem; background: var(--border); color: var(--text); border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">Reset Filters</button>
            </aside>

            <section class="product-grid" id="product-grid">
                <!-- Products will be injected here -->
            </section>
        </main>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const productGrid = document.getElementById('product-grid');
        const searchInput = document.getElementById('search-input');
        const categoryFilter = document.getElementById('category-filter');
        const minPriceInput = document.getElementById('min-price');
        const maxPriceInput = document.getElementById('max-price');
        const sortBySelect = document.getElementById('sort-by');
        const resetBtn = document.getElementById('reset-filters');
        const themeToggle = document.getElementById('theme-toggle');

        let debounceTimer;

        async function fetchProducts() {
            productGrid.innerHTML = Array(6).fill(0).map(() => `
                <div class="product-card">
                    <div class="product-image loading-shimmer"></div>
                    <div class="product-info">
                        <div style="height: 12px; width: 40%; margin-bottom: 10px;" class="loading-shimmer"></div>
                        <div style="height: 24px; width: 80%; margin-bottom: 10px;" class="loading-shimmer"></div>
                        <div style="height: 16px; width: 100%; margin-bottom: 5px;" class="loading-shimmer"></div>
                        <div style="height: 16px; width: 60%;" class="loading-shimmer"></div>
                    </div>
                </div>
            `).join('');

            const search = searchInput.value;
            const category = categoryFilter.value;
            const min_price = minPriceInput.value;
            const max_price = maxPriceInput.value;
            let sort_by = sortBySelect.value;
            let order = 'asc';

            if (sort_by === 'price_desc') {
                sort_by = 'price';
                order = 'desc';
            }

            const params = new URLSearchParams({
                search, category, min_price, max_price, sort_by, order
            });

            try {
                const response = await fetch(`${API_URL}/products?${params}`);
                const products = await response.json();
                renderProducts(products);
            } catch (error) {
                console.error('Fetch error:', error);
                productGrid.innerHTML = '<div class="no-results">Error connection to server. Make sure server.js is running.</div>';
            }
        }

        function renderProducts(products) {
            if (products.length === 0) {
                productGrid.innerHTML = '<div class="no-results">No products found matching your criteria.</div>';
                return;
            }

            productGrid.innerHTML = products.map((p, index) => `
                <div class="product-card" style="animation-delay: ${index * 0.1}s">
                    <img src="${p.image_url}" alt="${p.name}" class="product-image">
                    <div class="product-info">
                        <span class="product-category">${p.category}</span>
                        <h3 class="product-name">${p.name}</h3>
                        <p class="product-description">${p.description}</p>
                        <div class="product-footer">
                            <span class="product-price">$${p.price.toLocaleString()}</span>
                            <span class="product-rating">⭐ ${p.rating}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function fetchCategories() {
            try {
                const response = await fetch(`${API_URL}/categories`);
                const categories = await response.json();
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    categoryFilter.appendChild(option);
                });
            } catch (error) {
                console.error('Categories fetch error:', error);
            }
        }

        function handleInput() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(fetchProducts, 300);
        }

        searchInput.addEventListener('input', handleInput);
        categoryFilter.addEventListener('change', fetchProducts);
        minPriceInput.addEventListener('input', handleInput);
        maxPriceInput.addEventListener('input', handleInput);
        sortBySelect.addEventListener('change', fetchProducts);

        resetBtn.addEventListener('click', () => {
            searchInput.value = '';
            categoryFilter.value = '';
            minPriceInput.value = '';
            maxPriceInput.value = '';
            sortBySelect.value = 'id';
            fetchProducts();
        });

        themeToggle.addEventListener('click', () => {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
            } else {
                body.setAttribute('data-theme', 'light');
                themeToggle.textContent = '🌙';
            }
        });

        // Initial Load
        fetchCategories();
        fetchProducts();
    </script>
</body>
</html>
